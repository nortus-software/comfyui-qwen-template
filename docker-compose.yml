services:
  comfyui:
    image: nortus/comfyui-qwen-template:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8188:8188"
      - "8888:8888"
    volumes:
      - ./data/workspace:/workspace
    environment:
      - GITHUB_PAT=${GITHUB_PAT:-}
      - HF_TOKEN=${HF_TOKEN:-}
